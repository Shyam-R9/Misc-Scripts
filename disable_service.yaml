---
- name: Stop and disable firewalld safely on RHEL 9
  hosts: all
  become: yes
  gather_facts: no
  ignore_unreachable: yes

  vars:
    service_name: firewalld

  tasks:
    - name: Check if firewalld service exists
      ansible.builtin.shell: |
        if systemctl list-unit-files --all | grep -qw {{ service_name }}.service; then
          echo "present"
        else
          echo "absent"
        fi
      register: firewalld_check
      changed_when: false
      ignore_errors: yes

    - name: Stop and disable firewalld if present
      ansible.builtin.shell: |
        systemctl stop {{ service_name }}
        systemctl disable {{ service_name }}
      when: firewalld_check.stdout == "present"
      register: firewalld_action
      ignore_errors: yes

    - name: Set host status
      ansible.builtin.set_fact:
        host_status: >-
          {% if firewalld_check is failed %}
            failed
          {% elif firewalld_check.stdout == "absent" %}
            skipped
          {% else %}
            success
          {% endif %}

- name: Generate final report
  hosts: all
  gather_facts: no
  tasks:
    - name: Show host status
      ansible.builtin.debug:
        msg: "{{ inventory_hostname }} : {{ hostvars[inventory_hostname]['host_status'] | default('unreachable') }}"
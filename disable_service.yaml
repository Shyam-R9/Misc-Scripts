- name: Stop and disable firewalld with reporting
  hosts: all
  become: yes
  gather_facts: no
  ignore_unreachable: yes
  vars:
    service_name: firewalld

  tasks:
    - name: Gather service facts
      ansible.builtin.service_facts:

    - name: Stop and disable firewalld if active
      ansible.builtin.service:
        name: "{{ service_name }}"
        state: stopped
        enabled: false
      when: service_name + ".service" in ansible_facts.services